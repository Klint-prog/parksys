services:
  db:
    image: postgres:16-alpine
    container_name: parking_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_secure_pass_2024
      POSTGRES_DB: parking_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - parking_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking_user -d parking_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parking_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: parking_user
      DB_PASSWORD: parking_secure_pass_2024
      DB_NAME: parking_system
      JWT_SECRET: super_secret_jwt_key_parking_2024
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - parking_network
    volumes:
      - receipts_data:/app/receipts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: parking_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - parking_network

networks:
  parking_network:
    driver: bridge

volumes:
  postgres_data:
  receipts_data:
